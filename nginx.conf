events {
    worker_connections 1024;
}

http {
    default_type  application/octet-stream;
	resolver 10.89.2.1 valid=10s;

    # Logging
    access_log off;
    error_log  /dev/stderr warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        font/ttf
        font/otf
        font/woff
        image/svg+xml;

    server {
		listen       80;
		location / {
			access_by_lua_file /usr/local/openresty/nginx/lua/rate_limit.lua;

			proxy_pass http://host.docker.internal:8000;
		}
	}
}
